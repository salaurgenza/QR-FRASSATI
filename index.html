<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scanner QR Code</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 18px; }
    h1 { margin: 0 0 12px; font-size: 20px; }
    #reader { width: 100%; max-width: 520px; border-radius: 12px; overflow: hidden; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
    button {
      padding: 10px 12px; border: 0; border-radius: 10px; cursor: pointer;
      background: #111; color: #fff; font-weight: 700;
    }
    button.secondary { background: #e9e9e9; color: #111; }
    .box {
      max-width: 520px; padding: 12px; border: 1px solid #ddd; border-radius: 12px;
      background: #fafafa;
    }
    .label { font-size: 12px; opacity: .7; margin-bottom: 6px; }
    #result { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .hint { font-size: 12px; opacity: .75; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📷 Scanner QR Code (GitHub Pages)</h1>

  <div id="reader"></div>

  <div class="row">
    <button id="startBtn">Avvia scanner</button>
    <button id="stopBtn" class="secondary" disabled>Ferma</button>
    <button id="copyBtn" class="secondary" disabled>Copia risultato</button>
  </div>

  <div class="box">
    <div class="label">Contenuto QR (decodedText)</div>
    <div id="result">—</div>
    <div class="hint">
      iPhone: apri in Safari (non browser interni tipo WhatsApp). Serve HTTPS.
    </div>
  </div>

  <!-- ✅ LIBRERIA LOCALE (NO CDN) -->
  <!-- Deve esistere nel repo: /QR-FRASSATI/html5-qrcode.min.js -->
  <script src="/QR-FRASSATI/html5-qrcode.min.js"></script>

  <script>
    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const copyBtn  = document.getElementById("copyBtn");
    const resultEl = document.getElementById("result");

    let html5QrCode = null;
    let lastText = "";

    function setResult(text) {
      lastText = text || "";
      resultEl.textContent = text || "—";
      copyBtn.disabled = !lastText;
    }

    function isSecureOk() {
      const isLocalhost =
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1" ||
        location.hostname === "[::1]";
      const isHttps = location.protocol === "https:";
      return isHttps || isLocalhost;
    }

    async function startScanner() {
      try {
        // 1) Contesto sicuro (GitHub Pages = HTTPS OK)
        if (!isSecureOk()) {
          throw new Error("Apri la pagina su HTTPS oppure su localhost (non file://).");
        }

        // 2) Libreria caricata?
        if (typeof Html5Qrcode === "undefined") {
          throw new Error("Libreria non caricata: controlla che html5-qrcode.min.js sia nel repo e raggiungibile.");
        }

        // 3) Crea scanner
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        startBtn.disabled = true;
        stopBtn.disabled = false;

        // 4) Seleziona camera
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          throw new Error("Nessuna fotocamera trovata o permesso negato.");
        }

        // Preferisci camera posteriore se riconoscibile
        let chosenId = cameras[0].id;
        const backCam = cameras.find(c => /back|rear|environment/i.test(c.label));
        if (backCam) chosenId = backCam.id;

        // 5) Avvia e mostra il contenuto reale del QR
        await html5QrCode.start(
          { deviceId: { exact: chosenId } },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decodedText, decodedResult) => {
            console.log("QR decodedText:", decodedText);
            console.log("QR decodedResult:", decodedResult);

            setResult(decodedText);

            // ✅ Ferma dopo 1 lettura (evita ripetizioni)
            await stopScanner();
          },
          () => {}
        );

      } catch (e) {
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setResult("");
        alert("Errore avvio camera/scanner: " + (e?.message || e));
      }
    }

    async function stopScanner() {
      try {
        if (html5QrCode && html5QrCode.isScanning) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }
      } finally {
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(lastText);
        alert("Copiato negli appunti!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = lastText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        alert("Copiato!");
      }
    });
  </script>
</body>
</html>
