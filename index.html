<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner QR Code</title>

<style>
body { font-family: system-ui; margin: 20px; }
video { width: 100%; max-width: 500px; border-radius: 12px; background: black; }
button {
  padding: 10px 14px;
  margin: 8px 6px 8px 0;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  font-weight: bold;
}
.box {
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
}
</style>
</head>
<body>

<h2>📷 Scanner QR Code</h2>

<video id="video" playsinline></video>

<div>
  <button id="startBtn">Avvia Scanner</button>
  <button id="stopBtn" disabled>Ferma</button>
</div>

<div class="box">
  <strong>Contenuto QR:</strong>
  <div id="result">—</div>
</div>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let stream = null;
let detector = null;
let scanning = false;

async function startScanner() {
  try {
    if (!("BarcodeDetector" in window)) {
      alert("Questo browser non supporta BarcodeDetector. Prova Safari aggiornato o Chrome.");
      return;
    }

    const formats = await BarcodeDetector.getSupportedFormats();
    if (!formats.includes("qr_code")) {
      alert("QR non supportato su questo dispositivo.");
      return;
    }

    detector = new BarcodeDetector({ formats: ["qr_code"] });

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    scanning = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;

    scanLoop();

  } catch (err) {
    alert("Errore camera: " + err.message);
  }
}

async function scanLoop() {
  if (!scanning) return;

  try {
    const barcodes = await detector.detect(video);
    if (barcodes.length > 0) {
      const text = barcodes[0].rawValue;
      result.textContent = text;
      await stopScanner(); // Ferma dopo lettura
      return;
    }
  } catch {}

  requestAnimationFrame(scanLoop);
}

async function stopScanner() {
  scanning = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  video.srcObject = null;
}

startBtn.addEventListener("click", startScanner);
stopBtn.addEventListener("click", stopScanner);
</script>

</body>
</html>
